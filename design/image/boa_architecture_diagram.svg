<svg width="900" height="1660" viewBox="0 0 900 1660" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="450" y1="0" x2="450" y2="1660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E222C"/>
      <stop offset="1" stop-color="#171A22"/>
    </linearGradient>
    <pattern id="dotGrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.2" fill="#4F5666" fill-opacity="0.55"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#C9D1E2"/>
    </marker>
    <style>
      .title { font: 600 24px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #D8DDED; }
      .label { font: 500 17px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #D8DDED; }
      .body { font: 400 16px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #C5CBDA; }
      .small { font: 400 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #C5CBDA; }
      .muted { font: 400 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #A9B0C0; }
      .box { fill: rgba(31, 36, 48, 0.82); stroke: #C9D1E2; stroke-width: 2.6; rx: 0; }
      .wire { stroke: #C9D1E2; stroke-width: 2.6; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="900" height="1660" fill="url(#bg)"/>
  <rect width="900" height="1660" fill="url(#dotGrid)"/>
  <rect x="24" y="24" width="852" height="1612" stroke="#D9E0EF" stroke-width="2.4"/>

  <text x="450" y="68" text-anchor="middle" class="title">BOA Cluster</text>
  <text x="450" y="102" text-anchor="middle" class="label">tile / K-loop / mode ctrl</text>

  <rect x="64" y="138" width="772" height="54" class="box"/>
  <text x="450" y="172" text-anchor="middle" class="label">L1 SRAM / Tile Buffer</text>
  <text x="450" y="235" text-anchor="middle" class="body">- A Tile Buffer   |   - B Tile Buffer   |   - C Seed / Partial Buf</text>

  <line x1="240" y1="192" x2="240" y2="270" class="wire" marker-end="url(#arrow)"/>
  <line x1="450" y1="192" x2="450" y2="270" class="wire" marker-end="url(#arrow)"/>
  <line x1="650" y1="192" x2="650" y2="270" class="wire" marker-end="url(#arrow)"/>

  <rect x="96" y="292" width="708" height="206" class="box"/>
  <text x="450" y="340" text-anchor="middle" class="label">Tile Loader / Index Mapper / Selector</text>
  <text x="144" y="386" class="body">- M/N tile selection</text>
  <text x="144" y="418" class="body">- Window Generator (stride/pad/kernel)</text>
  <text x="144" y="450" class="body">- K tile iteration</text>
  <text x="144" y="482" class="body">- external C seed selection</text>
  <text x="144" y="514" class="body">- lane/tile mask generation</text>

  <line x1="450" y1="498" x2="450" y2="586" class="wire" marker-end="url(#arrow)"/>

  <rect x="126" y="598" width="648" height="150" class="box"/>
  <text x="450" y="644" text-anchor="middle" class="label">Broadcast / Dispatch Fabric</text>
  <text x="176" y="686" class="body">- A[:,k] broadcast</text>
  <text x="176" y="718" class="body">- B[k,:] broadcast</text>
  <text x="176" y="750" class="body">- reduce / bypass path dispatch</text>

  <line x1="290" y1="748" x2="290" y2="820" class="wire" marker-end="url(#arrow)"/>
  <line x1="450" y1="748" x2="450" y2="820" class="wire" marker-end="url(#arrow)"/>
  <line x1="610" y1="748" x2="610" y2="820" class="wire" marker-end="url(#arrow)"/>

  <rect x="148" y="842" width="140" height="110" class="box"/>
  <text x="218" y="890" text-anchor="middle" class="label">OPA 0</text>
  <text x="218" y="926" text-anchor="middle" class="body">op+acc</text>

  <rect x="380" y="842" width="140" height="110" class="box"/>
  <text x="450" y="890" text-anchor="middle" class="label">OPA 1</text>
  <text x="450" y="926" text-anchor="middle" class="body">op+acc</text>

  <rect x="612" y="842" width="140" height="110" class="box"/>
  <text x="682" y="890" text-anchor="middle" class="label">OPA n</text>
  <text x="682" y="926" text-anchor="middle" class="body">op+acc</text>

  <text x="791" y="905" text-anchor="middle" class="muted">...</text>

  <path d="M218 952V1008H682V952" class="wire"/>
  <line x1="450" y1="1008" x2="450" y2="1080" class="wire" marker-end="url(#arrow)"/>

  <rect x="134" y="1100" width="632" height="154" class="box"/>
  <text x="450" y="1148" text-anchor="middle" class="label">BOA Local Reduction Tree</text>
  <text x="166" y="1190" class="body">- mode = ADD / MAX / MIN</text>
  <text x="166" y="1222" class="body">- merge OPA partial tiles</text>
  <text x="166" y="1254" class="body">- split-K partial merge</text>
  <text x="166" y="1286" class="body">- reduce / pooling bypass merge</text>

  <line x1="450" y1="1254" x2="450" y2="1336" class="wire" marker-end="url(#arrow)"/>

  <rect x="126" y="1354" width="648" height="126" class="box"/>
  <text x="450" y="1402" text-anchor="middle" class="label">Post-Op / Scale Unit</text>
  <text x="176" y="1444" class="body">- avg scale</text>
  <text x="176" y="1476" class="body">- quant / requant</text>
  <text x="486" y="1476" class="body">- clamp / relu (optional)</text>

  <line x1="450" y1="1480" x2="450" y2="1530" class="wire" marker-end="url(#arrow)"/>

  <rect x="126" y="1542" width="648" height="100" class="box"/>
  <text x="450" y="1576" text-anchor="middle" class="label">Output Tile / Partial Writeback</text>
  <text x="176" y="1616" class="small">- final tile writeback</text>
  <text x="458" y="1616" class="small">- partial tile feedback for next K tile</text>
</svg>
